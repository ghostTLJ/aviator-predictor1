version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - ML_SERVICE_URL=http://ml-service:5001
    depends_on:
      - ml-service
    networks:
      - aviator-network
    restart: unless-stopped

  ml-service:
    build:
      context: ./ml-service
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
    networks:
      - aviator-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
      - REACT_APP_WS_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - aviator-network
    restart: unless-stopped

networks:
  aviator-network:
    driver: bridge