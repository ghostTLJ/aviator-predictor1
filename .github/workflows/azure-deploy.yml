name: Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_BACKEND_APP_NAME: aviator-backend
  AZURE_FRONTEND_APP_NAME: aviator-frontend
  AZURE_ML_APP_NAME: aviator-ml-service
  NODE_VERSION: '18.x'
  PYTHON_VERSION: '3.11'

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Create deployment package
        working-directory: ./backend
        run: |
          mkdir -p deploy
          cp -r . deploy/
          cd deploy
          rm -rf node_modules
          npm ci --omit=dev

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_BACKEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: './backend/deploy'

  deploy-ml-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create deployment package
        working-directory: ./ml-service
        run: |
          mkdir -p deploy
          cp -r . deploy/
          cd deploy
          pip install -r requirements.txt -t "$GITHUB_WORKSPACE/deploy"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_ML_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_ML_PUBLISH_PROFILE }}
          package: './ml-service/deploy'

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          REACT_APP_API_URL: https://${{ env.AZURE_BACKEND_APP_NAME }}.azurewebsites.net
          REACT_APP_WS_URL: wss://${{ env.AZURE_BACKEND_APP_NAME }}.azurewebsites.net

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_FRONTEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: './frontend/build'
